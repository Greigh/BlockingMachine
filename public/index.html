<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title data-id="metaTitle"></title>
    <link
      rel="shortcut icon"
      type="image/png"
      href="images/BlockIngMachine.png"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="page-block">
      <div class="container">
        <!-- Theme Toggle -->
        <button
          class="theme-toggle"
          id="themeToggle"
          aria-label="Toggle dark mode"
        >
          🌓
        </button>

        <div class="grid">
          <!-- Left Column -->
          <div class="column column--left">
            <div class="content">
              <!-- Header -->
              <h1
                data-id="protectedTitle"
                class="title content__title content__title--blue"
              ></h1>
              <div data-id="protectedDesc" class="text content__text"></div>

              <!-- Back Button -->
              <div class="content__btn">
                <button
                  type="button"
                  class="button"
                  data-size="medium"
                  data-type="filled"
                  data-color="blue"
                  data-id="backBtn"
                  data-back-btn
                ></button>
              </div>

              <!-- FAQ Section -->
              <div class="content__dropdown">
                <ul class="faq">
                  <!-- FAQ Item 1 -->
                  <li class="faq__item" data-dropdown-item>
                    <button
                      type="button"
                      class="faq-item__toggle"
                      data-dropdown-toggle
                    >
                      <span data-id="safeDropdownTitle3"
                        >Why is this website blocked?</span
                      >
                      <svg
                        class="faq-item__icon"
                        viewBox="0 0 24 24"
                        fill="none"
                      >
                        <path
                          d="M6 9l6 6 6-6"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                    </button>
                    <div class="faq-item__content" data-dropdown-content>
                      <div class="faq-item__desc">
                        <p
                          data-id="protectedDropdownDesc3"
                          class="faq-item__text"
                        ></p>
                        <p
                          data-id="protectedDropdownDesc4"
                          class="faq-item__text"
                        ></p>
                      </div>
                    </div>
                  </li>

                  <!-- FAQ Item 2 -->
                  <li class="faq__item" data-dropdown-item>
                    <button
                      type="button"
                      class="faq-item__toggle"
                      data-dropdown-toggle
                    >
                      <span data-id="safeDropdownTitle4"
                        >How to temporarily unblock this website?</span
                      >
                      <svg
                        class="faq-item__icon"
                        viewBox="0 0 24 24"
                        fill="none"
                      >
                        <path
                          d="M6 9l6 6 6-6"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                    </button>
                    <div class="faq-item__content" data-dropdown-content>
                      <div class="faq-item__desc">
                        <p
                          data-id="safeDropdownDesc4_1"
                          class="faq-item__text"
                        ></p>
                        <p
                          data-id="safeDropdownDesc4_2"
                          class="faq-item__text"
                        ></p>
                      </div>
                    </div>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <!-- Right Column -->
          <div class="column column--right">
            <div class="pic"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
