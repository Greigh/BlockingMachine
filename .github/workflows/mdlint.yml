name: MarkdownLint
permissions: write-all

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "25 0 * * *" # Runs daily at 0:25 UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  mdlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm" # Enable npm caching

      - name: Clean Install
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json
          npm install
          npm ci

      - name: Run Markdown Linter
        run: npm run mdlint

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs:
      - mdlint
    if: always() # Always notify regardless of success or failure
    steps:
      - name: Notify
        uses: nobrayner/discord-webhook@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          discord-webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: GitHub Actions
          avatar-url: https://avatars0.githubusercontent.com/u/44036562?s=200&v=4
          include-details: true
          color-success: 17cf48
          color-failure: e72727
          color-cancelled: d3d3d3
