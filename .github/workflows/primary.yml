name: Primary Workflow
permissions: write-all
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Add cache clearing step
      - name: Clear npm cache
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm ci
      - run: npm run eslint
      - run: npm run mdlint
      - run: npm run aglint

  update-txt-files:
    needs: lint
    name: Update TXT Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Add cache clearing step
      - name: Clear npm cache
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm ci
      - run: npm run update
      - run: npm run update-md
      - name: Check for changes
        id: changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT
      - name: Commit and push if changed
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "Update filter lists and documentation"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-website:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs:
      - update-txt-files
      - deploy-website
    if: ${{ failure() }} # Only notify on failure
    steps:
      - name: Notify
        uses: nobrayner/discord-webhook@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          discord-webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: GitHub Actions
          avatar-url: https://avatars0.githubusercontent.com/u/44036562?s=200&v=4
          include-details: true
          color-success: 17cf48
          color-failure: e72727
          color-cancelled: d3d3d3
